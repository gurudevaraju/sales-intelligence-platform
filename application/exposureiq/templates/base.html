<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ExposureIQ{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="shell">
  <header class="navbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Exposure<b>IQ</b></span>
    </div>
    <nav class="nav">
      <a href="/" class="{{ 'active' if active=='dashboard' else '' }}">
        <svg viewBox="0 0 24 24" class="ic"><path d="M3 13h4v8H3zM10 3h4v18h-4zM17 8h4v13h-4z"/></svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="/companies" class="{{ 'active' if active=='companies' else '' }}">
        <svg viewBox="0 0 24 24" class="ic"><path d="M4 21V7l8-4 8 4v14h-6v-6H10v6z"/></svg>
        <span class="nav-label">Company Risk Overview</span>
      </a>
      <a href="/vulnerable-assets" class="{{ 'active' if active=='vulnerable' else '' }}">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 2l9 4v6c0 5-3.6 8.7-9 10-5.4-1.3-9-5-9-10V6z"/></svg>
        <span class="nav-label">Vulnerable Assets</span>
      </a>
      <a href="/leads" class="{{ 'active' if active=='leads' else '' }}">
        <svg viewBox="0 0 24 24" class="ic"><path d="M4 5h16v3H4zM4 11h16v3H4zM4 17h10v3H4z"/></svg>
        <span class="nav-label">Lead Management</span>
      </a>
      <a href="/reports" class="{{ 'active' if active=='reports' else '' }}">
        <svg viewBox="0 0 24 24" class="ic"><path d="M5 3v18h16M9 17V10M14 17V6M19 17v-4"/></svg>
        <span class="nav-label">Reports &amp; Analytics</span>
      </a>
    </nav>
    <div class="navbar-right">
      <span class="source-pill">local /data · demo sample</span>
    </div>
  </header>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">{% block header %}{% endblock %}</div>
      <div class="topbar-actions">{% block header_actions %}{% endblock %}</div>
    </div>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
